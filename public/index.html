<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thực hành </title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-800">
  <main class="mx-auto w-full max-w-6xl px-4 py-10 sm:px-6">


    <section class="grid gap-6 lg:grid-cols-2" aria-label="Khu vực bài tập">
      <article class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h2 class="mb-6 text-lg font-bold text-emerald-500">
          KIỂM TRA THÔNG TIN
        </h2>

        <form id="info-form" class="grid gap-3">
          <label class="text-sm font-medium text-slate-600" for="info-name">Tên</label>
          <input id="info-name"
            class="h-11 rounded-md border border-slate-200 px-3 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
            name="name" type="text" placeholder="Nhập tên..." />

          <label class="text-sm font-medium text-slate-600" for="info-age">Tuổi</label>
          <input id="info-age"
            class="h-11 rounded-md border border-slate-200 px-3 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
            name="age" type="number" min="1" max="120" placeholder="Nhập tuổi..." />

          <button
            class="mt-2 h-11 rounded-md bg-emerald-600 font-bold text-white transition hover:bg-emerald-700 active:translate-y-px"
            type="submit">
            Gửi GET /api/info
          </button>
        </form>

        <pre id="info-result"
          class="mt-4 min-h-[4rem] overflow-auto whitespace-pre-wrap rounded-md border border-slate-200 bg-slate-50 p-4 font-mono text-sm leading-relaxed text-slate-700">Kết quả ...</pre>
      </article>

      <article class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h2 class="mb-6 text-lg font-bold text-emerald-500">
          ĐĂNG KÝ NGƯỜI DÙNG
        </h2>

        <form id="register-form" class="grid gap-3">
          <label class="text-sm font-medium text-slate-600" for="register-name">Tên</label>
          <input id="register-name"
            class="h-11 rounded-md border border-slate-200 px-3 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
            name="name" type="text" placeholder="Nhập tên..." />

          <label class="text-sm font-medium text-slate-600" for="register-age">Tuổi</label>
          <input id="register-age"
            class="h-11 rounded-md border border-slate-200 px-3 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
            name="age" type="number" min="1" max="120" placeholder="Nhập tuổi..." />

          <label class="text-sm font-medium text-slate-600" for="register-email">Email</label>
          <input id="register-email"
            class="h-11 rounded-md border border-slate-200 px-3 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
            name="email" type="email" placeholder="Nhập email..." />

          <button
            class="mt-2 h-11 rounded-md bg-emerald-600 font-bold text-white transition hover:bg-emerald-700 active:translate-y-px"
            type="submit">
            Gửi POST /api/register
          </button>
        </form>

        <pre id="register-result"
          class="mt-4 min-h-[4rem] overflow-auto whitespace-pre-wrap rounded-md border border-slate-200 bg-slate-50 p-4 font-mono text-sm leading-relaxed text-slate-700">Kết quả ...</pre>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
</body>

</html>
